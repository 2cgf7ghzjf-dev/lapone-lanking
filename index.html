<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARTO顔ランキング</title>
<style>
body{
font-family:sans-serif;
text-align:center;
padding:20px;
}
.choice{
display:inline-block;
width:40%;
margin:10px;
padding:30px;
border:2px solid #ccc;
border-radius:15px;
cursor:pointer;
font-size:24px;
}
.choice:hover{
background:#f0f0f0;
}
button{
padding:10px 20px;
font-size:18px;
margin-top:20px;
}
</style>
</head>
<body>

<h1>STARTO 顔ランキング</h1>

<div id="game">
<div class="choice" id="left"></div>
<div class="choice" id="right"></div>
</div>

<div id="result" style="display:none;"></div>

<script>
const idols = [
"岩本照","深澤辰哉","ラウール","渡辺翔太","向井康二","阿部亮平","目黒蓮","宮舘涼太","佐久間大介",
"ジェシー","京本大我","松村北斗","高地優吾","森本慎太郎","田中樹",
"西畑大吾","大西流星","道枝駿佑","高橋恭平","長尾謙杜","藤原丈一郎","大橋和也",
"永瀬廉","髙橋海人",
"宮近海斗","中村海人","七五三掛龍也","川島如恵留","吉澤閑也","松田元太","松倉海斗",
"佐藤勝利","菊池風磨","松島聡","寺西拓人","原嘉孝","橋本将生","猪俣周杜","篠塚大輝",
"末澤誠也","正門良規","草間リチャード敬太","小島健","佐野晶哉"
];

let scores = {};
idols.forEach(i => scores[i]=0);

let round = 0;
const maxRounds = 100;

function nextMatch(){
if(round>=maxRounds){
showResult();
return;
}

let a = idols[Math.floor(Math.random()*idols.length)];
let b = idols[Math.floor(Math.random()*idols.length)];

while(a===b){
b = idols[Math.floor(Math.random()*idols.length)];
}

document.getElementById("left").textContent=a;
document.getElementById("right").textContent=b;

document.getElementById("left").onclick=()=>{
scores[a]++;
round++;
nextMatch();
};

document.getElementById("right").onclick=()=>{
scores[b]++;
round++;
nextMatch();
};
}

function showResult(){
document.getElementById("game").style.display="none";

let ranking = Object.entries(scores)
.sort((a,b)=>b[1]-a[1]);

let html="<h2>ランキング結果</h2>";

ranking.forEach((r,i)=>{
html += `<p>${i+1}位　${r[0]} (${r[1]}票)</p>`;
});

document.getElementById("result").innerHTML=html;
document.getElementById("result").style.display="block";
}

nextMatch();
</script>

</body>
</html>
